services:
  - type: web
    runtime: node
    name: jrb-ecommerce-web
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate
    startCommand: npm run prisma:deploy || npx prisma db push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: Jhoana Rosales Boutique
      - key: DATABASE_URL
        fromDatabase:
          name: jrb-ecommerce-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CSRF_ENABLED
        value: "true"
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"

databases:
  - name: jrb-ecommerce-db
    plan: free
    databaseName: jrboutique
    user: jrb_user
    ipAllowList: []
